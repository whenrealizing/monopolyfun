name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm check:flyway-migrations

      - run: pnpm security:pr-policy

      - run: mvn -f apps/api/pom.xml org.owasp:dependency-check-maven:check org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom
        env:
          # 使用仓库 secret 提升 NVD 同步稳定性。
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - run: pnpm audit

      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/java
            p/typescript
