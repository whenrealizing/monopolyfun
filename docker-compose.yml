services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: monopolyfun-postgres
    restart: unless-stopped
    # 中文注释：本地和测试环境默认开启慢查询统计，性能报告脚本可直接读取 pg_stat_statements。
    command: ["postgres", "-c", "shared_preload_libraries=pg_stat_statements", "-c", "pg_stat_statements.track=all"]
    environment:
      POSTGRES_DB: monopolyfun
      POSTGRES_USER: postgres
      # 中文注释：Postgres 初始化密码与应用 DATABASE_PASSWORD 对齐，避免生产 smoke 轮换后本地 API 连接失效。
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d monopolyfun"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - monopolyfun-postgres:/var/lib/postgresql/data

  forgejo:
    image: codeberg.org/forgejo/forgejo:12-rootless
    container_name: monopolyfun-forgejo
    restart: unless-stopped
    environment:
      USER_UID: 1000
      USER_GID: 1000
      FORGEJO__database__DB_TYPE: sqlite3
      FORGEJO__security__INSTALL_LOCK: "true"
      FORGEJO__service__DISABLE_REGISTRATION: "false"
      FORGEJO__server__DOMAIN: localhost
      FORGEJO__server__ROOT_URL: ${FORGEJO_WEB_BASE_URL:-http://localhost:3001/}
      FORGEJO__server__SSH_DOMAIN: localhost
      FORGEJO__server__SSH_PORT: "2222"
    ports:
      - "${FORGEJO_HOST_PORT:-3001}:3000"
      - "${FORGEJO_SSH_HOST_PORT:-2222}:2222"
    volumes:
      - monopolyfun-forgejo:/var/lib/gitea

  forgejo-init:
    image: codeberg.org/forgejo/forgejo:12-rootless
    container_name: monopolyfun-forgejo-init
    restart: "no"
    depends_on:
      - forgejo
    environment:
      FORGEJO_ADMIN_USERNAME: ${FORGEJO_USERNAME:-monopolyfun}
      FORGEJO_ADMIN_PASSWORD: ${FORGEJO_PASSWORD:-monopolyfun-dev-password}
      FORGEJO_ADMIN_EMAIL: ${FORGEJO_ADMIN_EMAIL:-monopolyfun@example.local}
    volumes:
      - monopolyfun-forgejo:/var/lib/gitea
    entrypoint:
      - /bin/sh
      - -ec
      - |
        # 中文注释：等待 Forgejo 生成配置后创建本地演示账号，初始化动作保持幂等。
        until [ -f /var/lib/gitea/custom/conf/app.ini ]; do sleep 2; done
        forgejo admin user create \
          --config /var/lib/gitea/custom/conf/app.ini \
          --username "$$FORGEJO_ADMIN_USERNAME" \
          --password "$$FORGEJO_ADMIN_PASSWORD" \
          --email "$$FORGEJO_ADMIN_EMAIL" \
          --admin \
          --must-change-password=false || true

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: monopolyfun-anvil
    restart: unless-stopped
    # 中文注释：覆盖 Foundry 镜像默认 shell 入口，确保 --host 生效并对宿主机开放 RPC。
    entrypoint: ["anvil"]
    command: ["--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "${ANVIL_HOST_PORT:-8545}:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast chain-id --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  testchain-deploy:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: monopolyfun-testchain-deploy
    restart: "no"
    depends_on:
      anvil:
        condition: service_healthy
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      MONOPOLYFUN_REVENUE_RPC_EIP155_31337: ${MONOPOLYFUN_REVENUE_RPC_EIP155_31337:-http://anvil:8545}
      MONOPOLYFUN_REVENUE_TOKEN_ADDRESS: ${MONOPOLYFUN_REVENUE_TOKEN_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      MONOPOLYFUN_REVENUE_ROUTER_ADDRESS: ${MONOPOLYFUN_REVENUE_ROUTER_ADDRESS:-0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512}
      TESTCHAIN_REVENUE_SEED_MINOR: ${TESTCHAIN_REVENUE_SEED_MINOR:-100000000000}
    entrypoint: ["bash", "scripts/testchain/deploy-local-revenue-contracts.sh"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: monopolyfun-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/monopolyfun}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-postgres}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-postgres}
      APP_PRODUCTION: ${APP_PRODUCTION:-false}
      MONOPOLYFUN_SCHEDULER_ENABLED: ${MONOPOLYFUN_SCHEDULER_ENABLED:-${APP_PRODUCTION:-false}}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-MONOPOLYFUN_SESSION}
      SESSION_TTL: ${SESSION_TTL:-30d}
      CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-MONOPOLYFUN_CSRF}
      CSRF_HEADER_NAME: ${CSRF_HEADER_NAME:-X-CSRF-Token}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-Lax}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      UPLOAD_PROVIDER: ${UPLOAD_PROVIDER:-fake}
      UPLOAD_BUCKET: ${UPLOAD_BUCKET:-monopolyfun-proof-artifacts}
      UPLOAD_ENDPOINT: ${UPLOAD_ENDPOINT:-}
      UPLOAD_REGION: ${UPLOAD_REGION:-auto}
      UPLOAD_ACCESS_KEY_ID: ${UPLOAD_ACCESS_KEY_ID:-}
      UPLOAD_SECRET_ACCESS_KEY: ${UPLOAD_SECRET_ACCESS_KEY:-}
      UPLOAD_BASE_URL: ${UPLOAD_BASE_URL:-https://r2.example/monopolyfun-proof-artifacts}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://r2.example/monopolyfun-proof-artifacts}
      UPLOAD_PRESIGN_TTL: ${UPLOAD_PRESIGN_TTL:-15m}
      UPLOAD_MAX_BYTES: ${UPLOAD_MAX_BYTES:-10485760}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-fake}
      PAYMENT_CALLBACK_SECRET: ${PAYMENT_CALLBACK_SECRET:-monopolyfun-dev-secret}
      DIGITAL_INVENTORY_ENCRYPTION_SECRET: ${DIGITAL_INVENTORY_ENCRYPTION_SECRET:-monopolyfun-digital-inventory-dev-secret}
      PAYMENT_PUBLIC_BASE_URL: ${PAYMENT_PUBLIC_BASE_URL:-http://localhost:8080}
      PAYMENT_CURRENCY: ${PAYMENT_CURRENCY:-USD}
      FORGEJO_API_BASE_URL: ${FORGEJO_API_BASE_URL:-http://forgejo:3000/api/v1}
      FORGEJO_WEB_BASE_URL: ${FORGEJO_WEB_BASE_URL:-http://localhost:3001}
      FORGEJO_ORGANIZATION: ${FORGEJO_ORGANIZATION:-}
      FORGEJO_USERNAME: ${FORGEJO_USERNAME:-monopolyfun}
      FORGEJO_PASSWORD: ${FORGEJO_PASSWORD:-monopolyfun-dev-password}
      FORGEJO_ACCESS_TOKEN: ${FORGEJO_ACCESS_TOKEN:-}
      FORGEJO_DEFAULT_BRANCH: ${FORGEJO_DEFAULT_BRANCH:-main}
      MONOPOLYFUN_REVENUE_CHAIN_ID: ${MONOPOLYFUN_REVENUE_CHAIN_ID:-eip155:31337}
      MONOPOLYFUN_REVENUE_CHAIN_NAME: ${MONOPOLYFUN_REVENUE_CHAIN_NAME:-Anvil}
      MONOPOLYFUN_REVENUE_ASSET: ${MONOPOLYFUN_REVENUE_ASSET:-USDC}
      MONOPOLYFUN_REVENUE_TOKEN_TYPE: ${MONOPOLYFUN_REVENUE_TOKEN_TYPE:-mock-erc20}
      MONOPOLYFUN_REVENUE_TOKEN_ADDRESS: ${MONOPOLYFUN_REVENUE_TOKEN_ADDRESS:-0x5FbDB2315678afecb367f032d93F642f64180aa3}
      MONOPOLYFUN_REVENUE_ROUTER_ADDRESS: ${MONOPOLYFUN_REVENUE_ROUTER_ADDRESS:-0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512}
      MONOPOLYFUN_REVENUE_RPC_EIP155_31337: ${MONOPOLYFUN_REVENUE_RPC_EIP155_31337:-http://anvil:8545}
      MARKET_MATCHING_PROVIDER: ${MARKET_MATCHING_PROVIDER:-aliyun_qwen}
      ALIYUN_QWEN_API_KEY: ${ALIYUN_QWEN_API_KEY:-}
      ALIYUN_QWEN_BASE_URL: ${ALIYUN_QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      MARKET_EMBEDDING_MODEL: ${MARKET_EMBEDDING_MODEL:-Qwen3-Embedding-0.6B}
      MARKET_RERANK_MODEL: ${MARKET_RERANK_MODEL:-Qwen3-Reranker-0.6B}
      MARKET_EMBEDDING_DIMENSIONS: ${MARKET_EMBEDDING_DIMENSIONS:-1024}
      MARKET_RERANK_TOP_N: ${MARKET_RERANK_TOP_N:-30}
      MARKET_VECTOR_CANDIDATE_LIMIT: ${MARKET_VECTOR_CANDIDATE_LIMIT:-80}
      MARKET_TEXT_CANDIDATE_LIMIT: ${MARKET_TEXT_CANDIDATE_LIMIT:-80}
      MARKET_MATCHED_THRESHOLD: ${MARKET_MATCHED_THRESHOLD:-0.75}
      MARKET_REVIEW_THRESHOLD: ${MARKET_REVIEW_THRESHOLD:-0.45}
    depends_on:
      postgres:
        condition: service_healthy
      forgejo-init:
        condition: service_completed_successfully
      anvil:
        condition: service_healthy
      testchain-deploy:
        condition: service_completed_successfully
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
        API_BASE_URL: ${API_BASE_URL:-http://api:8080}
    container_name: monopolyfun-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8080}
      API_BASE_URL: ${API_BASE_URL:-http://api:8080}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-3000}:3000"

volumes:
  monopolyfun-postgres:
  monopolyfun-forgejo:
